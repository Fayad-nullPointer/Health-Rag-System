<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Chatbot</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px; 
            box-sizing: border-box;
        }
        #chat-container { 
            width: 100%; 
            max-width: 600px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            height: 90vh; /* Adjust height based on viewport */
        }
        #header { 
            background: #007bff; 
            color: white; 
            padding: 20px; 
            text-align: center; 
            font-size: 1.4em; 
            font-weight: bold; 
        }
        #chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .message { 
            max-width: 80%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            line-height: 1.4; 
            position: relative; 
            word-wrap: break-word;
        }
        .user-msg { 
            background: #007bff; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
        }
        .bot-msg { 
            background: #f1f0f0; 
            color: #333; 
            align-self: flex-start; 
            border-bottom-left-radius: 4px; 
        }
        .meta-data { 
            font-size: 0.75em; 
            color: #777; 
            margin-top: 5px; 
            font-family: monospace;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        #input-container { 
            display: flex; 
            border-top: 1px solid #ddd; 
            padding: 15px; 
            background: #fff; 
        }
        #user-input { 
            flex: 1; 
            padding: 12px 15px; 
            border: 1px solid #ccc; 
            border-radius: 25px; 
            outline: none; 
            font-size: 1em;
        }
        #user-input:focus {
            border-color: #007bff;
        }
        #send-btn { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            margin-left: 10px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em;
            transition: background 0.2s;
        }
        #send-btn:hover { 
            background: #0056b3; 
        }
        #loading {
            align-self: flex-start;
            font-style: italic;
            color: #aaa;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">Mental Health Assistant</div>
        <div id="chat-box">
            <div class="message bot-msg">Hello! I am a mental health assistant. How are you feeling today?</div>
        </div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, isUser, meta = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
            msgDiv.innerText = text;

            if (meta && !isUser) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta-data';
                metaDiv.innerText = `Intent: ${meta.detected_intent} | Emotion: ${meta.detected_emotion} | Lang: ${meta.detected_language} | Source: ${meta.source}`;
                msgDiv.appendChild(metaDiv);
            }

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show User Message
            appendMessage(text, true);
            userInput.value = '';

            // 2. Show Loading Indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading';
            loadingDiv.innerText = 'Typing...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Make API Call to /chat endpoint
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_message: text })
                });
                
                const data = await response.json();
                
                // 4. Remove Loading Indicator
                document.getElementById('loading').remove();
                
                if (response.ok) {
                    appendMessage(data.response, false, {
                        detected_intent: data.detected_intent,
                        detected_emotion: data.detected_emotion,
                        detected_language: data.detected_language,
                        source: data.source
                    });
                } else {
                    appendMessage("Error: " + (data.detail || JSON.stringify(data)), false);
                }
            } catch (error) {
                document.getElementById('loading')?.remove();
                appendMessage("Network error. Make sure the server is running.", false);
                console.error(error);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
