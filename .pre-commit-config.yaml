repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version
    rev: v0.4.10
    hooks:
      # Run the linter to catch bugs, warnings, and auto-fix simple issues
      - id: ruff
        args: [ --fix ]
      # Run the formatter to keep code styling consistent
      - id: ruff-format
