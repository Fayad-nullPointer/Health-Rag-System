version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=https://73aa79b6-9952-4ab7-a6ad-1fd64502ba39.eu-central-1-0.aws.cloud.qdrant.io
      - QDRANT_API_KEY=${QDRANT_API_KEY}
    depends_on:
      - qdrant
    volumes:
      - ./:/app
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

volumes:
  redis_data:
  qdrant_data:

networks:
  app-network:
    driver: bridge