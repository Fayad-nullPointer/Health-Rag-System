<!DOCTYPE html>
<html>
<head>
    <title>MindCare AI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">🧠 MindCare AI</div>

    <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/chat">Chat</a>
    </nav>

    <div class="auth-area">
        <span id="user-greeting" style="margin-right:10px;color:#fff;"></span>

        <a href="/login" id="login-link">Login</a>
        <a href="/register" id="register-link">Register</a>

        <button id="logout-btn" onclick="logout()" style="display:none;">
            Logout
        </button>
    </div>
</header>

<div class="home-container">
    <h1>MindCare AI</h1>

    <p>Your AI mental health assistant</p>

    <div class="home-buttons">
        <a href="/chat">Start Chat</a>
    </div>
</div>

<script src="/static/js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const user = getUser();

    const greeting = document.getElementById("user-greeting");

    if (user) {
        greeting.textContent = `Hi, ${user.username} 👋`;
    }

    updateNavbar();
});
</script>

</body>
</html>
