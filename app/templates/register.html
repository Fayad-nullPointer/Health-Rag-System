<!DOCTYPE html>
<html>
<head>
    <title>Register - MindCare AI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            🧠 MindCare AI
        </div>

        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/chat">Chat</a>
        </nav>

        <div class="auth-area" id="auth-area">
            <a href="/login" id="login-link">Login</a>
            <a href="/register" id="register-link">Register</a>

            <button id="logout-btn" onclick="logout()" style="display:none;">
                Logout
            </button>
        </div>
    </header>

<div class="auth-container">

    <h2>Register</h2>

    <input type="text" id="reg-firstname" placeholder="First Name">
    <input type="text" id="reg-lastname" placeholder="Last Name">
    <input type="text" id="reg-username" placeholder="Username">
    <input type="email" id="reg-email" placeholder="Email">
    <input type="password" id="reg-password" placeholder="Password">
    <input type="text" id="reg-country" placeholder="Country">

    <button onclick="register()">Create Account</button>

    <p>Already have an account? <a href="/login">Login</a></p>

</div>

<script src="/static/js/auth.js"></script>

</body>
</html>
