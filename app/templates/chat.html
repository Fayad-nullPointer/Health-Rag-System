<!DOCTYPE html>
<html>
<head>
    <title>MindCare AI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">🧠 MindCare AI</div>

    <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/chat">Chat</a>
    </nav>

    <div class="auth-area">
        <span id="user-greeting" style="margin-right:10px;color:#fff;"></span>

        <a href="/login" id="login-link">Login</a>
        <a href="/register" id="register-link">Register</a>

        <button id="logout-btn" onclick="logout()" style="display:none;">
            Logout
        </button>
    </div>
</header>

<div class="chat-container">

    <div class="header">
        <h1>MindCare AI</h1>
        <p>Your mental health support companion</p>
    </div>

    <div id="chat-box" class="chat-box">
        <div class="bot-message">
            Hello 👋 How are you feeling today?
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="message-input" placeholder="Type your message...">
        <button id="send-btn">Send</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/chat.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const user = getUser();

    const greeting = document.getElementById("user-greeting");

    if (user) {
        greeting.textContent = `Hi, ${user.username}`;
    }

    updateNavbar();
});
</script>

</body>
</html>
