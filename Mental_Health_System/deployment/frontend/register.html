<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — Serenity</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --night:  #0d0f14;
    --card:   #181c25;
    --border: rgba(255,255,255,0.07);
    --sage:   #7db89a;
    --sage-dim:#4e8a6e;
    --blush:  #c9a98a;
    --text:   #e8e4dc;
    --muted:  #7a7870;
    --error:  #e07070;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--night);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .left-panel {
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    position: relative;
    overflow: hidden;
  }

  .left-panel::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(125,184,154,0.12), transparent 70%);
    top: -100px; right: -100px;
  }

  .left-panel::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,138,0.1), transparent 70%);
    bottom: -50px; left: -50px;
  }

  .panel-content {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .panel-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    margin-bottom: 3rem;
    text-decoration: none;
  }

  .logo-mark {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--sage), var(--blush));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
  }

  .logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 1.2rem;
  }

  .panel-title em { font-style: italic; color: var(--sage); }

  .panel-sub {
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 340px;
    line-height: 1.7;
    margin: 0 auto 3rem;
  }

  .breathing {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(125,184,154,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    position: relative;
    animation: breathe 5s ease-in-out infinite;
  }

  .breathing::before {
    content: '';
    position: absolute;
    width: 160%; height: 160%;
    border-radius: 50%;
    border: 1px solid rgba(125,184,154,0.08);
    animation: breathe 5s ease-in-out infinite;
    animation-delay: -1s;
  }

  .breathing-inner {
    width: 56px; height: 56px;
    background: radial-gradient(circle, rgba(125,184,154,0.25), rgba(125,184,154,0.05));
    border-radius: 50%;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50%       { transform: scale(1.12); opacity: 1; }
  }

  .right-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
  }

  .form-card {
    width: 100%;
    max-width: 460px;
    animation: slideIn 0.6s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .form-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    margin-bottom: 0.5rem;
  }

  .form-subheading {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
  }

  .form-subheading a {
    color: var(--sage);
    text-decoration: none;
  }

  .field {
    margin-bottom: 1.3rem;
  }

  .field label {
    display: block;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .field input,
  .field select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    appearance: none;
  }

  .field input:focus,
  .field select:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(125,184,154,0.1);
  }

  .field select option { background: #1a1e28; }

  .submit-btn {
    width: 100%;
    background: var(--sage);
    color: var(--night);
    border: none;
    border-radius: 10px;
    padding: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .submit-btn:hover {
    background: var(--sage-dim);
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(125,184,154,0.25);
  }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .error-msg {
    background: rgba(224,112,112,0.1);
    border: 1px solid rgba(224,112,112,0.3);
    color: var(--error);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-size: 0.87rem;
    margin-bottom: 1.2rem;
    display: none;
  }

  .error-msg.show { display: block; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(13,15,20,0.3);
    border-top-color: var(--night);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .submit-btn.loading .spinner { display: block; }
  .submit-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .left-panel { display: none; }
    .right-panel { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="left-panel">
  <div class="panel-content">
    <a href="/" class="panel-logo">
      <div class="logo-mark">🌿</div>
      <span class="logo-name">Serenity</span>
    </a>
    <h2 class="panel-title">A space just<br/>for <em>you</em></h2>
    <p class="panel-sub">
      Whatever you're carrying right now you don't have to carry it alone.
      We're here every time you need us.
    </p>
    <div class="breathing">
      <div class="breathing-inner">🌿</div>
    </div>
  </div>
</div>

<div class="right-panel">
  <div class="form-card">
    <h1 class="form-heading">Create your account</h1>
    <p class="form-subheading">
      Already have an account? <a href="/login">Sign in</a>
    </p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registerForm">
      <div class="field">
        <label>Your username</label>
        <input type="text" id="username" placeholder="How should we call you?" required autocomplete="username"/>
      </div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" placeholder="your@email.com" required autocomplete="email"/>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required/>
      </div>

      <div class="field">
        <label>Country</label>
        <select id="country" required>
          <option value="" disabled selected>Select your country</option>
          <optgroup label="Middle East & North Africa">
            <option>Egypt</option><option>Saudi Arabia</option><option>UAE</option>
            <option>Jordan</option><option>Lebanon</option><option>Kuwait</option>
            <option>Bahrain</option><option>Qatar</option><option>Oman</option>
            <option>Morocco</option><option>Tunisia</option><option>Algeria</option>
            <option>Libya</option><option>Iraq</option><option>Syria</option>
            <option>Yemen</option><option>Palestine</option>
          </optgroup>
          <optgroup label="Europe">
            <option>United Kingdom</option><option>Germany</option><option>France</option>
            <option>Spain</option><option>Italy</option><option>Netherlands</option>
            <option>Sweden</option><option>Norway</option><option>Poland</option>
            <option>Greece</option><option>Turkey</option>
          </optgroup>
          <optgroup label="North America">
            <option>United States</option><option>Canada</option><option>Mexico</option>
          </optgroup>
          <optgroup label="Asia">
            <option>India</option><option>Pakistan</option><option>Bangladesh</option>
            <option>Indonesia</option><option>Malaysia</option><option>China</option>
            <option>Japan</option><option>South Korea</option>
          </optgroup>
          <optgroup label="Africa">
            <option>South Africa</option><option>Nigeria</option><option>Kenya</option>
            <option>Ethiopia</option>
          </optgroup>
          <optgroup label="Oceania">
            <option>Australia</option><option>New Zealand</option>
          </optgroup>
        </select>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Create my account</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>
</div>

<script>
  const API = '';

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn      = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('errorMsg');

    btn.classList.add('loading');
    btn.disabled = true;
    errorDiv.classList.remove('show');

    // Mapped explicitly to your Auth schema RegisterRequest properties
    const payload = {
      username: document.getElementById('username').value.trim(),
      email   : document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      country : document.getElementById('country').value,
    };

    try {
      const res  = await fetch(`${API}/auth/register`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || 'Registration failed');

      // Aligned parameters with your TokenResponse data payload
      localStorage.setItem('token',    data.access_token);
      localStorage.setItem('userName', data.username);
      localStorage.setItem('country',  data.country);

      window.location.href = '/chat';
    } catch (err) {
      errorDiv.textContent = err.message;
      errorDiv.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
