<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="95" fill="url(#outerGlow)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.6"/>

  <!-- Mid ring -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>

  <!-- Core circle -->
  <circle cx="100" cy="100" r="40" fill="url(#circleGrad)" opacity="0.9"/>

  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="26" fill="#F0F9FF" opacity="0.95"/>

  <!-- Heart / mind icon — simple line art -->
  <path d="M100 118
           C100 118 82 106 82 95
           C82 88 88 84 94 86
           C97 87 100 90 100 90
           C100 90 103 87 106 86
           C112 84 118 88 118 95
           C118 106 100 118 100 118Z"
        fill="#0EA5E9" opacity="0.85"/>

  <!-- Subtle text arc removed for cleanliness — name in HTML -->
</svg>
